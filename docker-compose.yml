services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: usyd_campus_tour
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usyd_campus_tour"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://postgres:postgres@postgres:5432/usyd_campus_tour
      PAYLOAD_SECRET: docker-dev-secret-change-in-production
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    volumes:
      - media_uploads:/app/media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  media_uploads:
